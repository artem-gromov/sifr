name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install SQLCipher (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libsqlcipher-dev

      - name: Install SQLCipher (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install sqlcipher

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install openssl -y --no-progress
          $base = if (Test-Path "C:\Program Files\OpenSSL-Win64") { "C:\Program Files\OpenSSL-Win64" } else { "C:\Program Files\OpenSSL" }
          echo "OPENSSL_DIR=$base" >> $env:GITHUB_ENV
          # Newer choco packages put libs under lib\VC\x64\MD
          $vcLib = "$base\lib\VC\x64\MD"
          if (Test-Path $vcLib) {
            echo "OPENSSL_LIB_DIR=$vcLib" >> $env:GITHUB_ENV
          }
          echo "OPENSSL_INCLUDE_DIR=$base\include" >> $env:GITHUB_ENV

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all
