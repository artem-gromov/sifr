name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sifr-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sifr-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sifr-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install openssl -y --no-progress
          $base = if (Test-Path "C:\Program Files\OpenSSL-Win64") { "C:\Program Files\OpenSSL-Win64" } else { "C:\Program Files\OpenSSL" }
          echo "OPENSSL_DIR=$base" >> $env:GITHUB_ENV
          $vcLib = "$base\lib\VC\x64\MD"
          if (Test-Path $vcLib) {
            echo "OPENSSL_LIB_DIR=$vcLib" >> $env:GITHUB_ENV
          }
          echo "OPENSSL_INCLUDE_DIR=$base\include" >> $env:GITHUB_ENV

      - name: Build binary
        run: cargo build --release -p sifr

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create .pkg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist pkg-root/usr/local/bin
          cp target/release/sifr pkg-root/usr/local/bin/sifr
          pkgbuild \
            --root pkg-root \
            --identifier com.artem-gromov.sifr \
            --version "${{ steps.version.outputs.version }}" \
            --install-location / \
            "dist/${{ matrix.artifact }}.pkg"
          cd dist
          shasum -a 256 "${{ matrix.artifact }}.pkg" > "${{ matrix.artifact }}.pkg.sha256"

      - name: Create .deb (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist deb-root/usr/local/bin deb-root/DEBIAN
          cp target/release/sifr deb-root/usr/local/bin/sifr
          chmod 755 deb-root/usr/local/bin/sifr
          cat > deb-root/DEBIAN/control << 'EOF'
          Package: sifr
          Version: ${{ steps.version.outputs.version }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Artem Gromov
          Description: Cross-platform terminal password manager
           Sifr is a terminal password manager with an encrypted SQLCipher vault,
           Argon2id key derivation, TOTP support, and password generation.
          EOF
          sed -i 's/^          //' deb-root/DEBIAN/control
          dpkg-deb --build deb-root "dist/${{ matrix.artifact }}.deb"
          cd dist
          shasum -a 256 "${{ matrix.artifact }}.deb" > "${{ matrix.artifact }}.deb.sha256"

      - name: Create .zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path target/release/sifr.exe -DestinationPath "dist/${{ matrix.artifact }}.zip"
          Get-FileHash "dist/${{ matrix.artifact }}.zip" -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  ${{ matrix.artifact }}.zip" | Out-File -FilePath "dist/${{ matrix.artifact }}.zip.sha256" -Encoding ascii
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
