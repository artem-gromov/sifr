name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install openssl -y --no-progress
          $base = if (Test-Path "C:\Program Files\OpenSSL-Win64") { "C:\Program Files\OpenSSL-Win64" } else { "C:\Program Files\OpenSSL" }
          echo "OPENSSL_DIR=$base" >> $env:GITHUB_ENV
          $vcLib = "$base\lib\VC\x64\MD"
          if (Test-Path $vcLib) {
            echo "OPENSSL_LIB_DIR=$vcLib" >> $env:GITHUB_ENV
          }
          echo "OPENSSL_INCLUDE_DIR=$base\include" >> $env:GITHUB_ENV

      - name: Build binary
        run: cargo build --release -p sifr

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/sifr dist/sifr-${{ matrix.os }}
          cd dist
          shasum -a 256 sifr-${{ matrix.os }} > sifr-${{ matrix.os }}.sha256

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/release/sifr.exe dist/sifr-${{ matrix.os }}.exe
          Get-FileHash dist/sifr-${{ matrix.os }}.exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  sifr-${{ matrix.os }}.exe" | Out-File -FilePath dist/sifr-${{ matrix.os }}.sha256 -Encoding ascii
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
